<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo blanco para que se vea en modo claro y oscuro -->
  <rect width="64" height="64" rx="10" fill="#ffffff"/>

  <!-- Rayos arriba -->
  <line x1="32" y1="2"  x2="32" y2="8"  stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="5"  x2="43" y2="10" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="14" x2="50" y2="17" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="5"  x2="21" y2="10" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="9"  y1="14" x2="14" y2="17" stroke="#111" stroke-width="2" stroke-linecap="round"/>

  <!-- Vidrio del foco -->
  <path d="M32 10 C21 10 13 18 13 28 C13 35 17 40 23 43 L23 50 L41 50 L41 43 C47 40 51 35 51 28 C51 18 43 10 32 10 Z"
    fill="#2d7a4f" stroke="#111" stroke-width="2"/>

  <!-- Globo (círculo + líneas) -->
  <circle cx="32" cy="30" r="10" fill="none" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="32" cy="30" rx="5" ry="10" fill="none" stroke="#111" stroke-width="1.5"/>
  <line x1="22" y1="30" x2="42" y2="30" stroke="#111" stroke-width="1.5"/>
  <line x1="23" y1="25" x2="41" y2="25" stroke="#111" stroke-width="1.2"/>
  <line x1="23" y1="35" x2="41" y2="35" stroke="#111" stroke-width="1.2"/>

  <!-- </> encima del globo -->
  <text x="32" y="23" font-family="monospace" font-size="6" font-weight="bold" fill="#111" text-anchor="middle">&lt;/&gt;</text>

  <!-- Base del foco -->
  <rect x="23" y="50" width="18" height="4" rx="1.5" fill="#111"/>
  <rect x="24" y="54" width="16" height="3" rx="1.5" fill="#333"/>
  <rect x="25" y="57" width="14" height="3" rx="1.5" fill="#555"/>
</svg>
